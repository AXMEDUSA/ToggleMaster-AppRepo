name: evaluation Service CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "evaluation-service/**"
  pull_request:
    paths:
      - evaluation-service/**"

jobs:
  flag:
    uses: ./.github/workflows/shared-ci.yml
    with:
      service: evaluation-service
      image_name: evaluation-service
    secrets: inherit