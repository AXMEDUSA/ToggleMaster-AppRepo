name: Shared Microservice CI

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      image_name:
        required: true
        type: string

env:
  ACR_LOGIN_SERVER: toggleacr.azurecr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:

  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      ################################
      # BUILD & TEST
      ################################

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Build
        run: |
          cd ${{ inputs.service }}
          go build ./...

      - name: Unit Tests
        run: |
          cd ${{ inputs.service }}
          go test ./...

      ################################
      # LINTER
      ################################

      - name: Run GolangCI-Lint
        uses: golangci/golangci-lint-action@v3
        with:
          working-directory: ${{ inputs.service }}

      ################################
      # SCA (DEPENDENCY SCAN)
      ################################

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.service }}
          severity: CRITICAL,HIGH
          exit-code: 1

      ################################
      # SAST
      ################################

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./${{ inputs.service }}/...

      ################################
      # DOCKER BUILD
      ################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Docker Login ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker Image
        run: |
          TAG=${IMAGE_TAG:0:7}
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${TAG}
          docker build -t $IMAGE ./${{ inputs.service }}

      ################################
      # CONTAINER SCAN
      ################################

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1

      ################################
      # PUSH IMAGE
      ################################

      - name: Push Image
        run: |
          TAG=${IMAGE_TAG:0:7}
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${TAG}
          docker push $IMAGE