on:
  push:
    branches: ["main"]
    paths:
      - 'analytics-service/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.9'
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: analytics-service

jobs:

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependências
        working-directory: ./analytics-service
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Rodar Lint
        working-directory: ./analytics-service
        run: flake8 .

  testes-python:
    name: Testes Python
    runs-on: ubuntu-latest
    needs: lint-python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependências
        working-directory: ./analytics-service
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Rodar Testes
        working-directory: ./analytics-service
        run: pytest

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: testes-python

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Docker Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Definir TAG da imagem
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & Push
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker build -t $IMAGE ./analytics-service
          docker push $IMAGE