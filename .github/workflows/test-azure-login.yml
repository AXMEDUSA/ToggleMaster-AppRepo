name: Test Azure Login

on:
  workflow_dispatch:

jobs:
  test-login:
    runs-on: ubuntu-latest
    environment: prd

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify subscription
        run: az account show
