on:
  push:
    branches: ["main"]
    paths:
      - 'evaluation-service/**'
  workflow_dispatch:

env:
  GO_VERSION: '1.22'
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: evaluation-service

jobs:

  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Baixar dependências
        working-directory: ./evaluation-service
        run: go mod download

      - name: Go Vet
        working-directory: ./evaluation-service
        run: go vet ./...

      - name: GolangCI Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ./evaluation-service


  testes-go:
    name: Testes Go
    runs-on: ubuntu-latest
    needs: lint-go

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Baixar dependências
        working-directory: ./evaluation-service
        run: go mod download

      - name: Rodar Testes
        working-directory: ./evaluation-service
        run: go test ./... -v -cover


  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: testes-go
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Docker Login no ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Definir TAG
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & Push
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker build -t $IMAGE ./evaluation-service
          docker push $IMAGE