name: Build & Push Microservices to ACR

on:
  push:
    branches: [ "main" ]
    paths:
      - "auth-service/**"
      - "flag-service/**"
      - "targeting-service/**"
      - "evaluation-service/**"
      - "analytics-service/**"
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: toggleacr.azurecr.io

jobs:
  auth-service:
    if: contains(github.event.head_commit.modified, 'auth-service') || contains(github.event.head_commit.added, 'auth-service')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Docker login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push auth-service
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/auth-service:${{ github.sha }}
          docker build -t $IMAGE ./auth-service
          docker tag $IMAGE ${{ env.ACR_LOGIN_SERVER }}/auth-service:latest
          docker push $IMAGE
          docker push ${{ env.ACR_LOGIN_SERVER }}/auth-service:latest

  flag-service:
    if: contains(github.event.head_commit.modified, 'flag-service') || contains(github.event.head_commit.added, 'flag-service')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/flag-service:${{ github.sha }}
          docker build -t $IMAGE ./flag-service
          docker tag $IMAGE ${{ env.ACR_LOGIN_SERVER }}/flag-service:latest
          docker push $IMAGE
          docker push ${{ env.ACR_LOGIN_SERVER }}/flag-service:latest

  targeting-service:
    if: contains(github.event.head_commit.modified, 'targeting-service') || contains(github.event.head_commit.added, 'targeting-service')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/targeting-service:${{ github.sha }}
          docker build -t $IMAGE ./targeting-service
          docker tag $IMAGE ${{ env.ACR_LOGIN_SERVER }}/targeting-service:latest
          docker push $IMAGE
          docker push ${{ env.ACR_LOGIN_SERVER }}/targeting-service:latest

  evaluation-service:
    if: contains(github.event.head_commit.modified, 'evaluation-service') || contains(github.event.head_commit.added, 'evaluation-service')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/evaluation-service:${{ github.sha }}
          docker build -t $IMAGE ./evaluation-service
          docker tag $IMAGE ${{ env.ACR_LOGIN_SERVER }}/evaluation-service:latest
          docker push $IMAGE
          docker push ${{ env.ACR_LOGIN_SERVER }}/evaluation-service:latest

  analytics-service:
    if: contains(github.event.head_commit.modified, 'analytics-service') || contains(github.event.head_commit.added, 'analytics-service')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/analytics-service:${{ github.sha }}
          docker build -t $IMAGE ./analytics-service
          docker tag $IMAGE ${{ env.ACR_LOGIN_SERVER }}/analytics-service:latest
          docker push $IMAGE
          docker push ${{ env.ACR_LOGIN_SERVER }}/analytics-service:latest
