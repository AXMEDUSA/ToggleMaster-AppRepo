name: Build & Push Microservices to ACR

on:
  push:
    branches: [ "main" ]
    paths:
      - "auth-service/**"
      - "flag-service/**"
      - "targeting-service/**"
      - "evaluation-service/**"
      - "analytics-service/**"
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: toggleacr.azurecr.io
  # SHA completo; vamos encurtar dentro dos scripts
  IMAGE_TAG: ${{ github.sha }}

jobs:
  auth-service:
    runs-on: ubuntu-latest
    environment: prd
    if: github.event_name == 'workflow_dispatch' ||
        contains(join(github.event.head_commit.modified), 'auth-service') ||
        contains(join(github.event.head_commit.added), 'auth-service')

    steps:
      - uses: actions/checkout@v3

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Docker login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push auth-service
        run: |
          TAG=${IMAGE_TAG:0:7}
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/auth-service:${TAG}
          docker build -t $IMAGE ./auth-service
          docker push $IMAGE

      - name: Update GitOps repository - auth-service
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_PAT }}
          GITOPS_REPO: AXMEDUSA/ToggleMaster-gitops
          SERVICE: auth-service
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions Bot"
          git clone https://${GITOPS_TOKEN}@github.com/${GITOPS_REPO}.git gitops-repo
          cd gitops-repo
          SHORT_TAG=${IMAGE_TAG:0:7}
          
          # Update deployment.yaml
          DEPLOYMENT_FILE="environments/prd/${SERVICE}/deployment.yaml"
          if [ -f "${DEPLOYMENT_FILE}" ]; then
            sed -i "s|toggleacr.azurecr.io/${SERVICE}:[^ ]*|toggleacr.azurecr.io/${SERVICE}:${SHORT_TAG}|" "${DEPLOYMENT_FILE}"
            git add -A
            git commit -m "chore: Update ${SERVICE} image tag to ${SHORT_TAG}" || true
            git push
          else
            echo "Deployment file not found at ${DEPLOYMENT_FILE}"
          fi

