name: Build & Push Microservices to ACR

on:
  # Dispara quando você criar um release com tag (v1.0.0, v1.1.0, etc)
  push:
    tags:
      - "v*.*.*"

  # Opcional: permite rodar manualmente
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: toggleacr.azurecr.io
  # Se for tag (release) → usa a tag (v1.0.0)
  # Se for execução manual → cai pro SHA do commit
  IMAGE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

jobs:
  auth-service:
    runs-on: ubuntu-latest
    environment: prd

    steps:
      - uses: actions/checkout@v3

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Docker login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push auth-service
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/auth-service:${{ env.IMAGE_TAG }}
          docker build -t $IMAGE ./auth-service
          docker tag $IMAGE ${{ env.ACR_LOGIN_SERVER }}/auth-service:latest
          docker push $IMAGE
          docker push ${{ env.ACR_LOGIN_SERVER }}/auth-service:latest

  flag-service:
    runs-on: ubuntu-latest
