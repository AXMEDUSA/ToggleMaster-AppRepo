name: Build & Push Microservices to ACR

on:
  push:
    branches: [ "main" ]
    paths:
      - "auth-service/**"
      - "flag-service/**"
      - "targeting-service/**"
      - "evaluation-service/**"
      - "analytics-service/**"
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: toggleacr.azurecr.io

jobs:
  auth-service:
    runs-on: ubuntu-latest
    steps:
      - name: Check if auth-service was modified
        if: github.event_name == 'push' && !contains(github.event.head_commit.message, 'auth-service') && !contains(join(github.event.head_commit.modified), 'auth-service') && !contains(join(github.event.head_commit.added), 'auth-service')
        run: echo "Skipping auth-service job"
        continue-on-error: true

      - uses: actions/checkout@v3
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Docker login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build & push auth-service
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/auth-service:${{ github.sha }}
          docker build -t $IMAGE ./auth-service
          docker tag $IMAGE ${{ env.ACR_LOGIN_SERVER }}/auth-service:latest
          docker push $IMAGE
          docker push ${{ env.ACR_LOGIN_SERVER }}/auth-service:latest

  flag-service:
    runs-on: ubuntu-latest
    steps:
      - name: Check if flag-service was modified
        if: github.event_name == 'push' && !contains(join(github.event.head_commit.modified), 'flag-service') && !contains(join(github.event.head_commit.added), 'flag-service')
        run: echo "Skipping flag-service job"
        continue-on-error: true

      - uses: actions/checkout@v3
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Docker login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build & push flag-service
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/flag-service:${{ github.sha }}
          docker build -t $IMAGE ./flag-service
          docker tag $IMAGE ${{ env.ACR_LOGIN_SERVER }}/flag-service:latest
          docker push $IMAGE
          docker push ${{ env.ACR_LOGIN_SERVER }}/flag-service:latest

  targeting-service:
    runs-on: ubuntu-latest
    steps:
      - name: Check if targeting-service was modified
        if: github.event_name == 'push' && !contains(join(github.event.head_commit.modified), 'targeting-service') && !contains(join(github.event.head_commit.added), 'targeting-service')
        run: echo "Skipping targeting-service job"
        continue-on-error: true

      - uses: actions/checkout@v3
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Docker login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build & push targeting-service
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/targeting-service:${{ github.sha }}
          docker build -t $IMAGE ./targeting-service
          docker tag $IMAGE ${{ env.ACR_LOGIN_SERVER }}/targeting-service:latest
          docker push $IMAGE
          docker push ${{ env.ACR_LOGIN_SERVER }}/targeting-service:latest

  evaluation-service:
    runs-on: ubuntu-latest
    steps:
      - name: Check if evaluation-service was modified
        if: github.event_name == 'push' && !contains(join(github.event.head_commit.modified), 'evaluation-service') && !contains(join(github.event.head_commit.added), 'evaluation-service')
        run: echo "Skipping evaluation-service job"
        continue-on-error: true

      - uses: actions/checkout@v3
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Docker login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build & push evaluation-service
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/evaluation-service:${{ github.sha }}
          docker build -t $IMAGE ./evaluation-service
          docker tag $IMAGE ${{ env.ACR_LOGIN_SERVER }}/evaluation-service:latest
          docker push $IMAGE
          docker push ${{ env.ACR_LOGIN_SERVER }}/evaluation-service:latest

  analytics-service:
    runs-on: ubuntu-latest
    steps:
      - name: Check if analytics-service was modified
        if: github.event_name == 'push' && !contains(join(github.event.head_commit.modified), 'analytics-service') && !contains(join(github.event.head_commit.added), 'analytics-service')
        run: echo "Skipping analytics-service job"
        continue-on-error: true

      - uses: actions/checkout@v3
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Docker login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build & push analytics-service
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/analytics-service:${{ github.sha }}
          docker build -t $IMAGE ./analytics-service
          docker tag $IMAGE ${{ env.ACR_LOGIN_SERVER }}/analytics-service:latest
          docker push $IMAGE
          docker push ${{ env.ACR_LOGIN_SERVER }}/analytics-service:latest
