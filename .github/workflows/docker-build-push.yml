  evaluation-service:
    runs-on: ubuntu-latest
    environment: prd
    if: github.event_name == 'workflow_dispatch' ||
        contains(join(github.event.head_commit.modified), 'evaluation-service') ||
        contains(join(github.event.head_commit.added), 'evaluation-service')

    steps:
      - uses: actions/checkout@v3

      - name: Azure login
        uses: azure/login@v2
        with:
